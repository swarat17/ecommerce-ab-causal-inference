version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: ab_testing_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ab_testing
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data:/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: ab_testing_api
    ports:
      - "8000:8000"
    environment:
      DB_URL: postgresql://postgres:postgres@postgres:5432/ab_testing
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    profiles:
      - api

volumes:
  postgres_data:
